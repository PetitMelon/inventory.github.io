
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --radius: var(--border-radius-lg,12px); --radius-md: var(--border-radius-md,8px); }
  .app { max-width: 700px; margin: 0 auto; padding: 1rem; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .header-title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .header-sub { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
  .add-btn { background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--radius-md); padding: 10px 18px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .add-btn:hover { opacity: 0.85; }
  .sync-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-text-success); flex-shrink: 0; }
  .sync-dot.loading { background: var(--color-text-warning); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--color-text-danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .alert-banner { background: var(--color-background-danger); color: var(--color-text-danger); border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 1rem; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-text-danger); flex-shrink: 0; }
  .tab-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .tab { border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); border-radius: 99px; padding: 7px 16px; font-size: 14px; cursor: pointer; }
  .tab.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
  .tab:hover:not(.active) { background: var(--color-background-secondary); }
  .section-title { font-size: 15px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 10px; margin-top: 4px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--radius); padding: 14px; cursor: pointer; }
  .card:hover { border-color: var(--color-border-secondary); }
  .card.low { border: 2px solid var(--color-text-danger); }
  .card.warn { border: 2px solid var(--color-text-warning); }
  .card-img { width: 100%; height: 90px; border-radius: var(--radius-md); margin-bottom: 10px; background: var(--color-background-tertiary); display: flex; align-items: center; justify-content: center; font-size: 36px; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .card-cat { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
  .stock-row { display: flex; align-items: center; justify-content: space-between; }
  .status-badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 99px; }
  .badge-ok { background: var(--color-background-success); color: var(--color-text-success); }
  .badge-warn { background: var(--color-background-warning); color: var(--color-text-warning); }
  .badge-low { background: var(--color-background-danger); color: var(--color-text-danger); }
  .stepper { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .step-btn { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .step-btn:hover { background: var(--color-background-tertiary); }
  .step-val { font-size: 14px; font-weight: 500; min-width: 20px; text-align: center; }
  .num-ok { color: var(--color-text-success); }
  .num-warn { color: var(--color-text-warning); }
  .num-low { color: var(--color-text-danger); }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; }
  .overlay.open { display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal { background: var(--color-background-primary); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 380px; max-height: 88vh; overflow-y: auto; }
  .modal-title { font-size: 18px; font-weight: 500; margin-bottom: 1.25rem; color: var(--color-text-primary); }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 5px; }
  .field input, .field select { width: 100%; border: 0.5px solid var(--color-border-secondary); border-radius: var(--radius-md); padding: 10px 12px; font-size: 15px; background: var(--color-background-primary); color: var(--color-text-primary); }
  .emoji-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 6px; margin-top: 4px; }
  .emoji-opt { font-size: 22px; padding: 6px; border-radius: var(--radius-md); border: 0.5px solid var(--color-border-tertiary); cursor: pointer; text-align: center; }
  .emoji-opt.selected { border: 2px solid var(--color-text-info); background: var(--color-background-info); }
  .img-preview { width: 100%; height: 100px; border-radius: var(--radius-md); background: var(--color-background-tertiary); display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 8px; overflow: hidden; }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; }
  .img-upload-label { display: block; width: 100%; border: 0.5px dashed var(--color-border-secondary); border-radius: var(--radius-md); padding: 10px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; text-align: center; background: var(--color-background-secondary); margin-bottom: 10px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-cancel { flex:1; padding:11px; border:0.5px solid var(--color-border-secondary); border-radius:var(--radius-md); background:var(--color-background-primary); color:var(--color-text-primary); font-size:15px; cursor:pointer; }
  .btn-save { flex:1; padding:11px; border:none; border-radius:var(--radius-md); background:var(--color-text-primary); color:var(--color-background-primary); font-size:15px; font-weight:500; cursor:pointer; }
  .btn-delete { padding:11px 16px; border:0.5px solid var(--color-text-danger); border-radius:var(--radius-md); background:transparent; color:var(--color-text-danger); font-size:15px; cursor:pointer; }
  .confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; }
  .confirm-overlay.open { display:flex; align-items:center; justify-content:center; padding:1rem; }
  .confirm-box { background:var(--color-background-primary); border-radius:var(--radius); padding:1.5rem; width:100%; max-width:300px; text-align:center; }
  .confirm-box p { font-size:16px; color:var(--color-text-primary); margin-bottom:1.25rem; line-height:1.6; }
  .confirm-actions { display:flex; gap:8px; }
  .confirm-no { flex:1; padding:11px; border:0.5px solid var(--color-border-secondary); border-radius:var(--radius-md); background:var(--color-background-primary); color:var(--color-text-primary); font-size:15px; cursor:pointer; }
  .confirm-yes { flex:1; padding:11px; border:none; border-radius:var(--radius-md); background:var(--color-text-danger); color:#fff; font-size:15px; font-weight:500; cursor:pointer; }
  .empty { text-align:center; padding:2rem; color:var(--color-text-secondary); font-size:14px; }
  .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); background:var(--color-text-primary); color:var(--color-background-primary); padding:10px 20px; border-radius:99px; font-size:14px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:999; white-space:nowrap; }
  .toast.show { opacity:1; }
</style>

<div class="app">
  <div class="header">
    <div>
      <div class="header-title">家族の在庫管理</div>
      <div class="header-sub">みんなで管理・いつでも確認</div>
    </div>
    <button class="add-btn" id="btn-add">＋ 追加</button>
  </div>
  <div class="sync-bar">
    <span class="sync-dot loading" id="sync-dot"></span>
    <span id="sync-label">データを読み込み中...</span>
    <button id="btn-reload" style="margin-left:auto;font-size:13px;background:none;border:0.5px solid var(--color-border-secondary);border-radius:99px;padding:4px 12px;cursor:pointer;color:var(--color-text-secondary);">更新</button>
  </div>
  <div id="alert-area"></div>
  <div class="tab-row" id="tabs"></div>
  <div id="list-area"></div>
</div>

<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">商品を追加</div>
    <div class="img-preview" id="img-preview"><span id="preview-emoji">🛒</span></div>
    <label class="img-upload-label" for="img-input">写真をアップロード</label>
    <input type="file" id="img-input" accept="image/*" style="display:none">
    <div class="field"><label>商品名</label><input type="text" id="f-name" placeholder="例：トイレットペーパー"></div>
    <div class="field"><label>カテゴリ</label>
      <select id="f-cat">
        <option>日用品</option><option>ペット用品</option><option>食品・飲料</option>
        <option>洗剤・清掃</option><option>薬・衛生</option><option>その他</option>
      </select>
    </div>
    <div class="field"><label>現在の在庫数</label><input type="number" id="f-stock" min="0" value="1"></div>
    <div class="field"><label>アラートの基準（この数以下で警告）</label><input type="number" id="f-threshold" min="0" value="2"></div>
    <div class="field"><label>単位（個・本・袋など）</label><input type="text" id="f-unit" placeholder="個" maxlength="4"></div>
    <div class="field"><label>アイコン</label><div class="emoji-grid" id="emoji-grid"></div></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">キャンセル</button>
      <button class="btn-delete" id="btn-delete" style="display:none">削除</button>
      <button class="btn-save" id="btn-save">保存</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p id="confirm-msg">この商品を削除しますか？</p>
    <div class="confirm-actions">
      <button class="confirm-no" id="confirm-no">キャンセル</button>
      <button class="confirm-yes" id="confirm-yes">削除する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EMOJIS = ['🧻','🧴','🧹','🪣','🧺','🐾','🐶','🐱','🐟','🥫','🍚','🥤','💊','🩺','🪥','🧼','🛁','🍶','🧃','🫙','🍞','🥛','☕','🫧','🧽','🗑'];
const CAT_EMOJI = {'日用品':'🏠','ペット用品':'🐾','食品・飲料':'🥦','洗剤・清掃':'🧴','薬・衛生':'💊','その他':'📦'};
const STORAGE_KEY = 'family-inventory-v1';

let items = [];
let nextId = 1;
let activeTab = '全て';
let editId = null;
let selectedEmoji = '🛒';
let uploadedImg = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setSyncStatus(status, label) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (status === 'ok' ? '' : status === 'loading' ? ' loading' : ' error');
  document.getElementById('sync-label').textContent = label;
}

async function loadFromCloud() {
  setSyncStatus('loading', 'データを読み込み中...');
  try {
    const result = await window.storage.get(STORAGE_KEY, true);
    if (result && result.value) {
      const data = JSON.parse(result.value);
      items = data.items || [];
      nextId = data.nextId || (items.length ? Math.max(...items.map(i=>i.id)) + 1 : 1);
    } else {
      items = getDefaultItems();
      nextId = items.length + 1;
      await saveToCloud();
    }
    const now = new Date();
    const hm = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
    setSyncStatus('ok', '最終更新：' + hm + ' （共有中）');
  } catch(e) {
    setSyncStatus('error', '読み込みエラー。オフラインで動作中');
    if (!items.length) { items = getDefaultItems(); nextId = items.length + 1; }
  }
  render();
}

async function saveToCloud() {
  setSyncStatus('loading', '保存中...');
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify({ items, nextId }), true);
    const now = new Date();
    const hm = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
    setSyncStatus('ok', '最終更新：' + hm + ' （共有中）');
  } catch(e) {
    setSyncStatus('error', '保存に失敗しました');
  }
}

function getDefaultItems() {
  return [
    {id:1,name:'トイレットペーパー',cat:'日用品',stock:1,threshold:3,unit:'個',emoji:'🧻',img:null},
    {id:2,name:'シャンプー',cat:'日用品',stock:5,threshold:2,unit:'本',emoji:'🧴',img:null},
    {id:3,name:'ワンちゃんのエサ',cat:'ペット用品',stock:2,threshold:2,unit:'袋',emoji:'🐾',img:null},
    {id:4,name:'猫砂',cat:'ペット用品',stock:4,threshold:1,unit:'袋',emoji:'🐱',img:null},
    {id:5,name:'食器用洗剤',cat:'洗剤・清掃',stock:1,threshold:2,unit:'本',emoji:'🧹',img:null},
    {id:6,name:'お米',cat:'食品・飲料',stock:3,threshold:1,unit:'袋',emoji:'🍚',img:null},
  ];
}

function getStatus(item) {
  if (item.stock === 0) return 'low';
  if (item.stock <= Math.floor(item.threshold / 2)) return 'low';
  if (item.stock <= item.threshold) return 'warn';
  return 'ok';
}

function getAllCats() {
  return ['全て', ...new Set(items.map(i => i.cat))];
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = getAllCats().map(c =>
    `<button class="tab${activeTab===c?' active':''}" data-tab="${c}">${CAT_EMOJI[c]||'📋'} ${c}</button>`
  ).join('');
}

function renderAlerts() {
  const low = items.filter(i => getStatus(i) !== 'ok');
  document.getElementById('alert-area').innerHTML = low.length
    ? `<div class="alert-banner"><span class="alert-dot"></span>在庫が少ない商品が${low.length}件あります：${low.map(i=>i.name).join('、')}</div>`
    : '';
}

function cardHTML(item) {
  const st = getStatus(item);
  const badges = {ok:'<span class="status-badge badge-ok">十分</span>',warn:'<span class="status-badge badge-warn">少ない</span>',low:'<span class="status-badge badge-low">要補充</span>'};
  const imgEl = item.img
    ? `<div class="card-img"><img src="${item.img}" alt="${item.name}"></div>`
    : `<div class="card-img">${item.emoji}</div>`;
  return `<div class="card ${st==='ok'?'':st}" data-edit="${item.id}">
    ${imgEl}
    <div class="card-name">${item.name}</div>
    <div class="card-cat">${item.cat}</div>
    <div class="stock-row"><span style="font-size:13px;color:var(--color-text-secondary)">在庫</span>${badges[st]}</div>
    <div class="stepper">
      <button class="step-btn" data-step="${item.id}" data-delta="-1">−</button>
      <span class="step-val num-${st}">${item.stock}</span>
      <span style="font-size:12px;color:var(--color-text-secondary)">${item.unit||'個'}</span>
      <button class="step-btn" data-step="${item.id}" data-delta="1">＋</button>
    </div>
  </div>`;
}

function renderList() {
  const filtered = activeTab === '全て' ? items : items.filter(i => i.cat === activeTab);
  const el = document.getElementById('list-area');
  if (!filtered.length) { el.innerHTML = '<div class="empty">商品がありません。「＋ 追加」から登録してください。</div>'; return; }
  if (activeTab === '全て') {
    const cats = [...new Set(filtered.map(i => i.cat))];
    el.innerHTML = cats.map(cat => {
      const ci = filtered.filter(i => i.cat === cat);
      return `<div class="section-title">${CAT_EMOJI[cat]||'📦'} ${cat}</div><div class="grid">${ci.map(cardHTML).join('')}</div>`;
    }).join('');
  } else {
    el.innerHTML = `<div class="grid">${filtered.map(cardHTML).join('')}</div>`;
  }
}

function render() { renderTabs(); renderAlerts(); renderList(); }

function buildEmojiGrid(sel) {
  document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e =>
    `<div class="emoji-opt${e===sel?' selected':''}" data-emoji="${e}">${e}</div>`
  ).join('');
}

function openAdd() {
  editId = null; uploadedImg = null; selectedEmoji = '🛒';
  document.getElementById('modal-title').textContent = '商品を追加';
  document.getElementById('f-name').value = '';
  document.getElementById('f-cat').value = '日用品';
  document.getElementById('f-stock').value = 1;
  document.getElementById('f-threshold').value = 2;
  document.getElementById('f-unit').value = '';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('img-preview').innerHTML = '<span id="preview-emoji">🛒</span>';
  buildEmojiGrid('🛒');
  document.getElementById('modal-overlay').classList.add('open');
}

function openEdit(id) {
  editId = id;
  const item = items.find(i => i.id === id);
  if (!item) return;
  selectedEmoji = item.emoji; uploadedImg = item.img || null;
  document.getElementById('modal-title').textContent = '在庫を編集';
  document.getElementById('f-name').value = item.name;
  document.getElementById('f-cat').value = item.cat;
  document.getElementById('f-stock').value = item.stock;
  document.getElementById('f-threshold').value = item.threshold;
  document.getElementById('f-unit').value = item.unit || '';
  document.getElementById('btn-delete').style.display = '';
  document.getElementById('img-preview').innerHTML = item.img
    ? `<img src="${item.img}" alt="">`
    : `<span id="preview-emoji">${item.emoji}</span>`;
  buildEmojiGrid(item.emoji);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

async function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('商品名を入力してください'); return; }
  const data = {
    name, cat: document.getElementById('f-cat').value,
    stock: parseInt(document.getElementById('f-stock').value) || 0,
    threshold: parseInt(document.getElementById('f-threshold').value) || 1,
    unit: document.getElementById('f-unit').value.trim() || '個',
    emoji: selectedEmoji, img: uploadedImg
  };
  if (editId) {
    const idx = items.findIndex(i => i.id === editId);
    if (idx !== -1) items[idx] = { ...items[idx], ...data };
  } else {
    items.push({ id: nextId++, ...data });
  }
  closeModal(); render();
  await saveToCloud();
  showToast('保存しました');
}

function confirmDelete() {
  const item = items.find(i => i.id === editId);
  if (!item) return;
  document.getElementById('confirm-msg').textContent = `「${item.name}」を削除しますか？`;
  document.getElementById('confirm-overlay').classList.add('open');
}

async function doDelete() {
  items = items.filter(i => i.id !== editId);
  document.getElementById('confirm-overlay').classList.remove('open');
  closeModal(); render();
  await saveToCloud();
  showToast('削除しました');
}

document.getElementById('btn-add').addEventListener('click', openAdd);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-save').addEventListener('click', saveItem);
document.getElementById('btn-delete').addEventListener('click', confirmDelete);
document.getElementById('btn-reload').addEventListener('click', loadFromCloud);
document.getElementById('confirm-no').addEventListener('click', () => document.getElementById('confirm-overlay').classList.remove('open'));
document.getElementById('confirm-yes').addEventListener('click', doDelete);

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('tabs').addEventListener('click', function(e) {
  const t = e.target.closest('[data-tab]');
  if (t) { activeTab = t.dataset.tab; render(); }
});

document.getElementById('list-area').addEventListener('click', async function(e) {
  const stepBtn = e.target.closest('[data-step]');
  if (stepBtn) {
    const id = parseInt(stepBtn.dataset.step);
    const delta = parseInt(stepBtn.dataset.delta);
    const item = items.find(i => i.id === id);
    if (item) {
      item.stock = Math.max(0, item.stock + delta);
      render();
      await saveToCloud();
    }
    return;
  }
  const card = e.target.closest('[data-edit]');
  if (card) openEdit(parseInt(card.dataset.edit));
});

document.getElementById('emoji-grid').addEventListener('click', function(e) {
  const opt = e.target.closest('[data-emoji]');
  if (!opt) return;
  selectedEmoji = opt.dataset.emoji;
  const pe = document.getElementById('preview-emoji');
  if (pe) pe.textContent = selectedEmoji;
  buildEmojiGrid(selectedEmoji);
});

document.getElementById('img-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    uploadedImg = ev.target.result;
    document.getElementById('img-preview').innerHTML = `<img src="${uploadedImg}" alt="">`;
  };
  reader.readAsDataURL(file);
});

loadFromCloud();

setInterval(loadFromCloud, 30000);
</script>
